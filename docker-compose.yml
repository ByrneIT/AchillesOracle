version: "3.8"
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - APP_ENV=production
      - SECRET_KEY
      - VAULT_ADDR
      - VAULT_TOKEN
    restart: unless-stopped
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys;res=urllib.request.urlopen('http://127.0.0.1:8000/health');sys.exit(0 if res.status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
  frontend:
    build:
      context: .
      dockerfile: ui/Dockerfile
    ports:
      - "3000:80"
    restart: unless-stopped
    environment:
      - APP_ENV=production
