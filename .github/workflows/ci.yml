name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: |
          pytest -q

  build-docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t achillesoracle-backend -f Dockerfile .
      - name: Build frontend image
        run: docker build -t achillesoracle-frontend -f ui/Dockerfile .
      - name: Scan backend image with Trivy (warning)
        uses: aquasecurity/trivy-action@v0.10.1
        with:
          image-ref: achillesoracle-backend:latest
          format: 'table'
          exit-code: '0'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
      - name: Scan frontend image with Trivy (warning)
        uses: aquasecurity/trivy-action@v0.10.1
        with:
          image-ref: achillesoracle-frontend:latest
          format: 'table'
          exit-code: '0'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
