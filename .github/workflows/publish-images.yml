name: Publish Docker images

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ github.event.release.tag_name || github.ref_name || github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/achillesoracle-backend:${{ env.IMAGE_TAG }}
            ghcr.io/${{ github.repository_owner }}/achillesoracle-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./ui
          file: ui/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/achillesoracle-frontend:${{ env.IMAGE_TAG }}
            ghcr.io/${{ github.repository_owner }}/achillesoracle-frontend:latest

      - name: Scan GHCR backend image with Trivy (warning)
        uses: aquasecurity/trivy-action@v0.10.1
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/achillesoracle-backend:${{ env.IMAGE_TAG }}
          format: 'table'
          exit-code: '0'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Scan GHCR frontend image with Trivy (warning)
        uses: aquasecurity/trivy-action@v0.10.1
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/achillesoracle-frontend:${{ env.IMAGE_TAG }}
          format: 'table'
          exit-code: '0'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Log in to Docker Hub (optional)
        if: ${{ secrets.DOCKERHUB_USERNAME && secrets.DOCKERHUB_TOKEN }}
        uses: docker/login-action@v2
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push backend to Docker Hub (optional)
        if: ${{ secrets.DOCKERHUB_USERNAME && secrets.DOCKERHUB_TOKEN }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/achillesoracle-backend:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/achillesoracle-backend:latest

      - name: Push frontend to Docker Hub (optional)
        if: ${{ secrets.DOCKERHUB_USERNAME && secrets.DOCKERHUB_TOKEN }}
        uses: docker/build-push-action@v5
        with:
          context: ./ui
          file: ui/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/achillesoracle-frontend:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/achillesoracle-frontend:latest

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install build tool
        run: |
          python -m pip install --upgrade pip build

      - name: Build Python package
        run: python -m build

      - name: Ensure release exists and set upload URL
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "UPLOAD_URL=${{ github.event.release.upload_url }}" >> $GITHUB_ENV
          else
            TAG=${{ github.ref_name }}
            echo "Creating release for tag $TAG"
            resp=$(curl -s -X POST -H "Authorization: token $GITHUB_TOKEN" -H "Content-Type: application/json" \
              -d "{\"tag_name\":\"$TAG\",\"name\":\"$TAG\",\"draft\":false}" \
              "https://api.github.com/repos/${{ github.repository }}/releases")
            upload_url=$(echo "$resp" | python -c "import sys,json;print(json.load(sys.stdin).get('upload_url') or '')")
            if [ -z "$upload_url" ]; then
              echo "Failed to create release: $resp" >&2
              exit 1
            fi
            echo "UPLOAD_URL=$upload_url" >> $GITHUB_ENV
          fi

      - name: Upload package artifacts to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPLOAD_URL: ${{ env.UPLOAD_URL }}
        run: |
          set -e
          UPLOAD_URL="${UPLOAD_URL%\{*}"
          for f in dist/*; do
            name=$(basename "$f")
            echo "Uploading $name to release"
            curl -s -X POST -H "Authorization: token $GITHUB_TOKEN" -H "Content-Type: application/octet-stream" --data-binary @"$f" "${UPLOAD_URL}?name=$name"
          done
